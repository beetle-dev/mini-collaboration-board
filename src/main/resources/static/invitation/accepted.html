<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보드 초대 수락 완료</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background-color: #f4f6f8;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            padding: 32px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 52px;
            height: 52px;
            border-radius: 999px;
            background-color: #d1fae5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #10b981;
            font-size: 28px;
            margin: 0 auto 16px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 22px;
            font-weight: 700;
        }
        p {
            margin: 0 0 8px;
            font-size: 14px;
            line-height: 1.6;
            color: #4b5563;
        }
        .sub-text {
            margin-top: 16px;
            font-size: 12px;
            color: #6b7280;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 999px;
            background-color: #2563eb;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">✓</div>
    <h1>초대가 수락되었어요</h1>
    <p>보드 초대가 정상적으로 수락되었습니다.</p>
    <p>이제 애플리케이션에서 해당 보드를 확인하실 수 있어요.</p>
    <p class="sub-text">
        이미 브라우저에서 서비스를 사용 중이라면,<br>
        새로고침 후 보드 목록을 다시 확인해 주세요.
    </p>
</div>
</body>
</html>
