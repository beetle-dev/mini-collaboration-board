<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보드 초대 수락 실패</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background-color: #f4f6f8;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            padding: 32px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 52px;
            height: 52px;
            border-radius: 999px;
            background-color: #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            font-size: 28px;
            margin: 0 auto 16px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 22px;
            font-weight: 700;
        }
        p {
            margin: 0 0 8px;
            font-size: 14px;
            line-height: 1.6;
            color: #4b5563;
        }
        .sub-text {
            margin-top: 16px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">!</div>
    <h1>초대를 수락할 수 없어요</h1>
    <p>이미 사용된 초대이거나, 만료되었거나, 잘못된 링크일 수 있습니다.</p>
    <p class="sub-text">
        초대 메일을 다시 확인해 주세요.<br>
        문제가 계속되면 보드 관리자에게 문의해 주세요.
    </p>
</div>
</body>
</html>
